<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: 'Segoe UI', Arial, sans-serif; padding: 15px; margin: 0; background: #fafafa; }
    h2 { color: #1e3a8a; margin-top: 0; display: flex; align-items: center; gap: 8px; }
    .status-box { padding: 12px; border-radius: 6px; background: #e2e8f0; font-weight: 600; margin-bottom: 12px; border: 1px solid #cbd5e1; font-size: 14px; text-align: center; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🛡️ ByteShield</h2>
  <div class="status-box" id="status">Engine Status: Guarding Pages</div>
  <button id="scan-btn">Scan Active Tab</button>

  <script style="display:none">
    document.getElementById('scan-btn').addEventListener('click', async () => {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = "Processing metrics...";
      statusDiv.style.background = "#fef3c7";
      statusDiv.style.borderColor = "#f59e0b";
      
      let [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      
      setTimeout(() => {
        statusDiv.innerHTML = "Active Ecosystem Scan Safe";
        statusDiv.style.background = "#dcfce7";
        statusDiv.style.borderColor = "#22c55e";
        alert(`ByteShield scan verified for domain location: ${tab.url}`);
      }, 500);
    });
  </script>
</body>
</html>
